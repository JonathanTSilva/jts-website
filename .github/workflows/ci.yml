name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Install Playwright Browsers
        run: pnpm test:e2e:install
        
      - name: Check Astro
        run: pnpm check
        
      - name: Lint Content
        run: pnpm lint:content
        
      - name: Unit Tests
        run: pnpm test:unit
        
      - name: Build
        run: pnpm build

      - name: E2E Tests
        run: pnpm test:e2e
