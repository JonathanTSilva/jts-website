<div class="cpu-container">
  <svg viewBox="0 0 200 120" class="cpu-svg" preserveAspectRatio="xMidYMid meet">
    <defs>
      <filter id="glow">
        <feGaussianBlur stdDeviation="1.5" result="coloredBlur" />
        <feMerge>
          <feMergeNode in="coloredBlur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>

      <linearGradient id="pulse-grad">
        <stop offset="0%" stop-color="transparent" />
        <stop offset="50%" stop-color="var(--accent, #00E8ED)" />
        <stop offset="100%" stop-color="transparent" />
      </linearGradient>

      <linearGradient id="cpu-shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#666" />
        <stop offset="50%" stop-color="#fff">
          <animate attributeName="offset" values="-1; 1.5" dur="3s" repeatCount="indefinite" />
        </stop>
        <stop offset="100%" stop-color="#666" />
      </linearGradient>
    </defs>

    <g class="traces" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.15">
      <path id="path1" d="M 0 30 H 70 Q 85 30 85 45 V 50" />
      <path id="path2" d="M 0 80 H 50 Q 65 80 65 65 V 60 H 80" />
      <path id="path3" d="M 200 20 H 130 Q 115 20 115 40" />
      <path id="path4" d="M 200 90 H 150 Q 135 90 135 70 H 120" />
      <path id="path5" d="M 95 75 V 120" />
      <path id="path6" d="M 105 75 V 120" />
    </g>

    <g filter="url(#glow)">
      <circle r="0.8" fill="var(--accent, #00E8ED)">
        <animateMotion dur="3s" repeatCount="indefinite" path="M 0 30 H 70 Q 85 30 85 45 V 50" />
      </circle>
      <circle r="0.8" fill="var(--accent, #00E8ED)">
        <animateMotion dur="4s" begin="1s" repeatCount="indefinite" path="M 200 20 H 130 Q 115 20 115 40" />
      </circle>
      <circle r="0.8" fill="var(--accent, #00E8ED)">
        <animateMotion dur="2.5s" begin="0.5s" repeatCount="indefinite" path="M 95 75 V 120" />
      </circle>
    </g>

    <g transform="translate(85, 45)">
      <rect width="30" height="25" rx="2" fill="#181818" stroke="var(--accent)" stroke-width="0.3" class="cpu-box" />
      <text x="15" y="16" text-anchor="middle" font-size="6" font-weight="bold" fill="url(#cpu-shimmer)" font-family="monospace">
        CPU
      </text>
      <g stroke="var(--accent)" stroke-width="0.5" opacity="0.5">
        <path d="M -2 5 h 2 M -2 10 h 2 M -2 15 h 2" />
        <path d="M 30 5 h 2 M 30 10 h 2 M 30 15 h 2" />
      </g>
    </g>
  </svg>
</div>

<style>
  .cpu-container {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: transparent;
  }

  .cpu-svg {
    width: 100%;
    max-width: 800px;
    color: var(--accent, #00E8ED); /* Inherit color for traces */
  }

  .cpu-box {
    animation: box-glow 4s ease-in-out infinite alternate;
  }

  @keyframes box-glow {
    0% { filter: drop-shadow(0 0 1px var(--accent)); }
    100% { filter: drop-shadow(0 0 4px var(--accent)); }
  }

  /* Entrance Animation for the whole group */
  .traces path {
    stroke-dasharray: 100;
    stroke-dashoffset: 100;
    animation: draw-in 2s ease-out forwards;
  }

  @keyframes draw-in {
    to { stroke-dashoffset: 0; }
  }
</style>
