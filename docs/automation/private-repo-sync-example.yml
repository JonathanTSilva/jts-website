# Example workflow for the private Obsidian repo
# This should be placed in .github/workflows/sync-website.yml in the PRIVATE repo

name: Notify Website Repo

on:
  push:
    branches: [ main ]
    paths:
      - '08-Publish/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Website Repo Workflow
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GHP_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/jts/jts-website/dispatches \
            -d '{"event_type":"sync_content"}'
